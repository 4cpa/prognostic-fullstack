services:
  postgres:
    image: postgres:15
    container_name: forecast-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: prognostic
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: prognosticdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    mem_limit: 1g
    cpus: 1.0

  backend:
    build:
      context: .
    image: prognostic-backend:local
    container_name: forecast-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://prognostic:${POSTGRES_PASSWORD}@postgres:5432/prognosticdb
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "127.0.0.1:8000:8000"
    mem_limit: 512m
    cpus: 0.5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: prognostic-frontend:local
    container_name: forecast-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:3000"
    mem_limit: 512m
    cpus: 0.5

  # --- Uptime Kuma: Endpoint-Monitoring & Alerting ---
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: forecast-uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - "127.0.0.1:3001:3001"
    mem_limit: 256m
    cpus: 0.25

volumes:
  postgres_data:
  uptime_kuma_data:
