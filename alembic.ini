# ---------------------------------------------------------
# Alembic Configuration – 4CPA Prognostic
# ---------------------------------------------------------

[alembic]

# Migration scripts location
script_location = alembic

# Add project root to sys.path
prepend_sys_path = .

# Use OS path separator
version_path_separator = os

# Dummy URL (overridden in alembic/env.py via settings.DATABASE_URL)
sqlalchemy.url = driver://user:pass@localhost/dbname


# ---------------------------------------------------------
# Logging Configuration
# ---------------------------------------------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic


[logger_root]
level = WARN
handlers = console
qualname =


[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine


[logger_alembic]
level = INFO
handlers =
qualname = alembic


[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic


[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
