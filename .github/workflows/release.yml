name: Release – Auto-Tag bei VERSION-Änderung

on:
  push:
    branches: ["main"]
    paths:
      - "VERSION"

permissions:
  contents: write

jobs:
  tag:
    name: Git-Tag & GitHub-Release erstellen
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: VERSION lesen
        id: version
        run: echo "value=v$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Prüfen ob Tag bereits existiert
        id: check
        run: |
          if git rev-parse "${{ steps.version.outputs.value }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: CHANGELOG-Abschnitt für diesen Release extrahieren
        if: steps.check.outputs.exists == 'false'
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          # Extrahiere den Abschnitt zwischen dieser Version und der vorherigen
          awk "/^## \[${VERSION#v}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md > release_notes.txt
          echo "notes_file=release_notes.txt" >> "$GITHUB_OUTPUT"

      - name: Git-Tag erstellen und pushen
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.value }}" -m "Release ${{ steps.version.outputs.value }}"
          git push origin "${{ steps.version.outputs.value }}"

      - name: GitHub-Release erstellen
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          name: "${{ steps.version.outputs.value }}"
          body_path: release_notes.txt
          draft: false
          prerelease: ${{ contains(steps.version.outputs.value, '-') }}
