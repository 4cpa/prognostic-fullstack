[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# --- Logging ---
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)-8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%dT%H:%M:%S

log_file = logs/test.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)-8s] %(name)s %(filename)s:%(lineno)d: %(message)s
log_file_date_format = %Y-%m-%dT%H:%M:%S

# --- Ausgabe ---
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

markers =
    unit: Reine Unit-Tests ohne I/O
    integration: Tests gegen eine echte Datenbank / HTTP-Server
    slow: Tests die länger als 2 Sekunden dauern
